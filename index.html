<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kingdoms</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/p5.js"></script>
</head>
<body>
    <p>Customise each player:</p><br>

    <label for="piece-select">Choose piece type:</label><br>

    <select name="chessPiece" id="piece-select">
    <option value="0">Knight</option>
    <option value="1">Pawn</option>
    <option value="2">King</option>
    <option value="3">General</option>
    <option value="4">Camel</option>
    <option value="5">Wildebeest</option>
    <option value="6">Ferz</option>
    <option value="7">Wazir</option>
    <option value="8">Alfil</option>
    <option value="9">Dabbaba</option>
    <option value="10">Alibaba</option>
    </select>
    
    <br><br>

    <label for="piece-colour">Choose piece colour: </label><br>

    <input type="color" id="piece-colour" name="colourOfPiece" value="#d43d51" />

    <br><br>

    <button id="push-piece" type="button">Add to list</button>

    <br><br>

    <button id="pop-piece" type="button">Remove last from list</button>

    <br><br>

    <table id="pieces-list">

    </table>

    <br><br>

    <button id="render" type="button">Render!</button>

    <br><br>

    <div id="kingdom">
    </div>

    <script src="sketch.js"></script>
</body>

</html>
